<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | SneakerHub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Cart Page Specific Styles */
        .cart-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .cart-item:last-child {
            margin-bottom: 0;
        }
        .cart-item-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .cart-item-name {
            font-weight: 500;
            font-size: 1.1rem;
        }
        .cart-item-price {
            color: #555;
        }
        .btn-remove {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s ease;
        }
        .btn-remove:hover {
            background-color: #ff2a3f;
        }
        .cart-total-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .empty-cart-msg {
            text-align: center;
            color: #666;
            margin: 40px 0;
        }
        /* Quantity Controls CSS */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-qty {
            background-color: #f1f1f1;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 0.2s ease;
        }
        .btn-qty:hover {
            background-color: #e2e2e2;
        }
        .qty-number {
            font-weight: 500;
            font-size: 1.1rem;
            min-width: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navbar Section -->
    <nav class="navbar dark-theme">
        <div class="container nav-content">
            <a href="index.html" class="logo">SNEAKERHUB</a>
            
            <ul class="nav-links center-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html"><span id="cart-count">🛒 Cart (0)</span></a></li>
            </ul>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="auth-link">Login</a>
                <a href="signup.html" class="auth-link">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Cart Main Content -->
    <main>
        <section class="container">
            <div class="cart-container">
                <h2 class="section-title">Your Cart 🛒</h2>
                
                <!-- Display cart items here -->
                <div id="cart-items">
                    <!-- Items will be injected by JavaScript -->
                </div>
                
                <!-- Total Price Section -->
                <div class="cart-total-section" id="cart-total-section">
                    <span>Total:</span>
                    <span id="cart-total">$0</span>
                </div>
                
                <div style="text-align: right; margin-top: 20px;">
                    <button id="btn-place-order" class="btn btn-primary" style="padding: 15px 30px; font-size: 1.1rem; background-color: #000; color: #fff; cursor: pointer; border: none; border-radius: 8px; font-weight: bold;">Place Order</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Cart Page Specific JavaScript -->
    <script src="cart.js"></script>
</body>
</html>
