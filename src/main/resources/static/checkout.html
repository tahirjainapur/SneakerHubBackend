<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | SneakerHub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar Section -->
    <nav class="navbar dark-theme">
        <div class="container nav-content">
            <a href="index.html" class="logo">SNEAKERHUB</a>
            
            <ul class="nav-links center-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html"><span id="cart-count">🛒 Cart (0)</span></a></li>
            </ul>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="auth-link">Login</a>
                <a href="signup.html" class="auth-link">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Checkout Main Content -->
    <main class="checkout-section">
        <section class="container">
            <h2 class="section-title">Secure Checkout 🔒</h2>
            <div class="checkout-wrapper">
                
                <!-- Order Summary Panel -->
                <div class="checkout-summary">
                    <h3>Order Summary</h3>
                    <div id="checkout-items-list" class="checkout-items-list">
                        <!-- Filled by JS -->
                    </div>
                    <div class="checkout-total-row">
                        <span>Total to Pay:</span>
                        <span id="checkout-total">₹0</span>
                    </div>
                </div>

                <!-- Checkout Form -->
                <div class="auth-card checkout-form">
                    <form id="checkout-form">
                        <div id="checkout-alert" class="alert-message"></div>

                        <h3>Shipping Details</h3>
                        <div class="form-group">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" class="form-control" placeholder="123 Sneaker St, Apt 4" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" class="form-control" placeholder="Mumbai" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="pincode">Pincode</label>
                            <input type="text" id="pincode" class="form-control" placeholder="400001" required>
                        </div>

                        <h3 style="margin-top: 30px;">Payment</h3>
                        <div class="form-group">
                            <label for="paymentMethod">Payment Method</label>
                            <select id="paymentMethod" class="select-box form-control" required style="width: 100%;">
                                <option value="">Select a method...</option>
                                <option value="COD">Cash on Delivery (COD)</option>
                                <option value="Card">Credit / Debit Card</option>
                                <option value="UPI">UPI</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary btn-auth" style="margin-top: 20px;">Confirm & Place Order</button>
                    </form>
                </div>

            </div>
        </section>
    </main>

    <!-- Scripting -->
    <script src="script.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
