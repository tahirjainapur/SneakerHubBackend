<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SneakerHub</title>
    <meta name="description" content="Create a new account on SneakerHub.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar Section -->
    <nav class="navbar dark-theme">
        <div class="container nav-content">
            <a href="index.html" class="logo">SNEAKERHUB</a>

            <ul class="nav-links center-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html"><span id="cart-count">🛒 Cart (0)</span></a></li>
            </ul>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="auth-link">Login</a>
                <a href="signup.html" class="auth-link active">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Authentication Section -->
    <main class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join SneakerHub to start shopping.</p>

            <div id="signup-alert" class="alert-message"></div>

            <form id="signup-form" method="post" action="signup">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="name" class="form-control" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Create a password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password">
                </div>

                <button type="submit" class="btn btn-auth">Sign Up</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
    <script src="signup.js"></script>
</body>

</html>
