<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SneakerHub</title>
    <meta name="description" content="Login to your SneakerHub account.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar Section -->
    <nav class="navbar dark-theme">
        <div class="container nav-content">
            <a href="index.html" class="logo">SNEAKERHUB</a>

            <ul class="nav-links center-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html"><span id="cart-count">🛒 Cart (0)</span></a></li>
            </ul>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="auth-link active">Login</a>
                <a href="signup.html" class="auth-link">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Authentication Section -->
    <main class="auth-section">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Enter your details to access your account.</p>

            <div id="login-alert" class="alert-message"></div>

            <form id="login-form" action="login" method="post">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-auth">Login</button>
            </form>

            <div class="auth-footer">
                <div style="margin-bottom: 10px;">
                    <a href="#" id="forgot-password-link">Forgot Password?</a>
                </div>
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </main>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
    <script src="login.js"></script>
</body>

</html>
