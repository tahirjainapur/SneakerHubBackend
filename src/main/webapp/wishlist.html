<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | SneakerHub</title>
    <meta name="description" content="View your saved SneakerHub products.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .wishlist-item {
            background-color: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition);
        }
        .wishlist-item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        .wishlist-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f8fafc;
        }
        .wishlist-item-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .wishlist-item-name {
            font-size: 1.15rem;
            font-weight: 600;
        }
        .wishlist-item-price {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: 700;
        }
        .btn-remove-wishlist {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            font-weight: 500;
            font-size: 0.95rem;
            font-family: inherit;
        }
        .btn-remove-wishlist:hover {
            background-color: #fee2e2;
        }
        .empty-state-msg {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-light);
            grid-column: 1 / -1;
            padding: 60px 20px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
        }
    </style>
</head>

<body>
    <!-- Navbar Section -->
    <nav class="navbar dark-theme">
        <div class="container nav-content">
            <a href="index.html" class="logo">SNEAKERHUB</a>

            <ul class="nav-links center-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#products">Products</a></li>
                <li><a href="cart.html"><span id="cart-count">🛒 Cart (0)</span></a></li>
            </ul>

            <div class="nav-auth" id="nav-auth">
                <a href="login.html" class="auth-link">Login</a>
                <a href="signup.html" class="auth-link">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Wishlist Main Content -->
    <main class="wishlist-container">
        <h2 class="section-title">Your Wishlist ❤️</h2>
        
        <div id="wishlist-grid" class="wishlist-grid">
            <!-- Items injected via JS -->
        </div>
    </main>

    <!-- Custom JavaScript -->
    <script src="wishlist.js"></script>
</body>

</html>
